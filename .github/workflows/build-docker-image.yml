name: Build concept-graphs-api image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag for the concept-graphs-api image, e.g. 1.0.0"
        required: true
        type: string
      dockerfile:
        description: "Dockerfile to build"
        required: true
        default: "Dockerfile-runtime-download"
        type: choice
        options:
          - Dockerfile
          - Dockerfile-runtime-download

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/concept-graphs-api

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version input
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9]+)*$ ]]; then
            echo "Invalid version/tag: ${{ inputs.version }}" >&2
            exit 1
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase IMAGE_NAME
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
