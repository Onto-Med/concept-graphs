openapi: 3.0.3
info:
  title: Concept Graphs API
  description: API for managing concept graphs
  version: 1.0.0
servers:
- url: http://top-prod:9007
- url: http://localhost:9007
- url: http://localhost:9010
paths:
  /preprocessing/statistics:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get basic statistics for the corpus
      responses:
        '200':
          description: Corpus statistics
      tags:
      - Artifacts
      operationId: getPreprocessingStatistics
  /preprocessing/noun_chunks:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get all noun chunks found
      responses:
        '200':
          description: Noun chunks
      tags:
      - Artifacts
      operationId: getPreprocessingNounChunks
  /embedding/statistics:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get basic statistics for the embedding object
      responses:
        '200':
          description: Embedding statistics
      tags:
      - Artifacts
      operationId: getEmbeddingStatistics
  /clustering/concepts:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Show concepts that were found
      parameters:
      - name: top_k
        in: query
        required: false
        schema:
          type: integer
        description: Number of top k representatives
        example: 15
      - name: distance
        in: query
        required: false
        schema:
          type: number
        description: Cosine distance threshold
        example: 0.6
      responses:
        '200':
          description: Concepts found
      tags:
      - Artifacts
      operationId: getClusteringConcepts
  /graph/document/add:
    parameters:
    - $ref: '#/components/parameters/process_name'
    post:
      summary: Adds document/s to an existing vector store index and integrates its/their
        phrases into the graphs that were built for the corpus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphDocumentAddition'
      responses:
        '200':
          description: Added document/s.
        '404':
          description: Path with specific argument not found.
        '501':
          description: Path with specific argument not yet implemented.
      tags:
      - Graph documents
      operationId: addGraphDocuments
  /graph/document/add/status:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get the status/result for a document addition task.
      responses:
        '200':
          description: Result of the document addition task
        '202':
          description: Request was accepted but thread task is still running
        '400':
          description: Some necessary input was not provided or is malformed (e.g.
            document content)
        '404':
          description: There was no such process found
        '500':
          description: Some unforeseen error happened; only the logs can shed light
        '501':
          description: Some methods are still not implemented
      tags:
      - Graph documents
      operationId: getGraphDocumentAdditionStatus
  /graph/statistics:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get basic statistics for the graphs
      responses:
        '200':
          description: Graph statistics
      tags:
      - Artifacts
      operationId: getGraphStatistics
  /graph/{graph_id}:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get nodes and adjacency information for a specific graph
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the graph
      - name: draw
        in: query
        required: false
        schema:
          type: boolean
        description: If true, response is a rendered graph
      responses:
        '200':
          description: Graph data
      tags:
      - Artifacts
      operationId: getGraph
  /pipeline:
    parameters:
    - $ref: '#/components/parameters/process_name'
    - $ref: '#/components/parameters/language'
    - name: skip_present
      in: query
      required: false
      schema:
        type: boolean
      description: Whether already finished steps should be skipped
      example: true
    - name: return_statistics
      in: query
      required: false
      schema:
        type: boolean
      description: Whether the pipeline returns statistics of its processes at the
        end of its run (may take a couple of hours) or silently starts the process
        and just returns whether it successfully started.
      example: false
    - name: skip_steps
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated list of pipeline steps ("data", "embedding", "clustering",
        "graph", "integration") that should be skipped
    post:
      summary: Start a complete pipeline with all sub steps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineConfiguration'
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  format: binary
                  description: Zip file containing text data (optional)
                document_server_config:
                  type: string
                  format: binary
                  description: Document server config file (optional)
                vectorstore_server_config:
                  type: string
                  format: binary
                  description: Vector store server config file (optional)
                data_config:
                  type: string
                  format: binary
                  description: Preprocessing config file (optional)
                embedding_config:
                  type: string
                  format: binary
                  description: Embedding config file (optional)
                clustering_config:
                  type: string
                  format: binary
                  description: Clustering config file (optional)
                graph_config:
                  type: string
                  format: binary
                  description: Graph config file (optional)
      responses:
        '200':
          description: Pipeline started
      tags:
      - Pipeline
      operationId: startPipeline
  /pipeline/configuration:
    parameters:
    - $ref: '#/components/parameters/process_name'
    - $ref: '#/components/parameters/language'
    get:
      summary: Get pipeline configuration
      parameters:
      - name: default
        in: query
        required: false
        schema:
          type: boolean
        description: If true, returns default configuration
        example: true
      responses:
        '200':
          description: Pipeline configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineConfiguration'
      tags:
      - Pipeline
      operationId: getPipelineConfiguration
  /processes:
    get:
      summary: Get all stored processes
      responses:
        '200':
          description: List of all stored processes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessesResponse'
      tags:
      - Processes
      operationId: listProcesses
  /processes/{process}/delete:
    parameters:
    - $ref: '#/components/parameters/process'
    delete:
      summary: Sets a process to be deleted from the cache and any finished & serialized
        steps
      parameters:
      - name: hard_stop
        in: query
        required: false
        schema:
          type: boolean
        description: Running processes need to be stopped before being able to be
          deleted. If set to 'false' (default) the stopping is handled gracefully.
        example: false
      responses:
        '200':
          description: Process was set to be deleted
        '404':
          description: No such process found
      tags:
      - Processes
      operationId: deleteProcess
  /processes/{process}/stop:
    parameters:
    - $ref: '#/components/parameters/process'
    get:
      summary: Sets a process to be stopped
      parameters:
      - name: hard_stop
        in: query
        required: false
        schema:
          type: boolean
        description: If set to 'false' (default) the stopping is handled gracefully.
        example: false
      responses:
        '200':
          description: Process was set to be stopped
        '404':
          description: No such process found
      tags:
      - Processes
      operationId: stopProcess
  /rag/init:
    parameters:
    - $ref: '#/components/parameters/process_name'
    - name: force
      in: query
      schema:
        type: boolean
      description: Resets an index for this process if present
      example: false
    post:
      summary: Initializes a RAG with the config provided
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGConfiguration'
      responses:
        '200':
          description: Initialization successful
        '202':
          description: Found already initializing thread
        '400':
          description: Something went wrong
      tags:
      - RAG
      operationId: initializeRag
  /rag/question:
    summary: Poses a question to the RAG component for the specified corpus/process
    parameters:
    - $ref: '#/components/parameters/process_name'
    - name: q
      in: query
      required: true
      schema:
        type: string
      description: The question to pose
      example: '?'
    get:
      summary: Ask the active RAG component a question
      description: Uses the ready RAG component for the selected process to retrieve
        relevant document chunks and generate an answer. The question is supplied
        via the `q` query parameter.
      responses:
        '200':
          description: The answer
        '400':
          description: Either no question posed or wrong method
        '404':
          description: No active RAG component found
        '500':
          description: Something went wrong
      tags:
      - RAG
      operationId: askRagQuestion
    post:
      summary: Ask the active RAG component a question with document filters
      description: Uses the ready RAG component for the selected process to retrieve
        relevant document chunks and generate an answer. The question is supplied
        via the `q` query parameter; the optional JSON body can restrict retrieval
        to specific document IDs and set the chunk limit.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                doc_ids:
                  type: array
                  items:
                    type: string
                limit:
                  type: integer
                  example: 15
      responses:
        '200':
          description: The answer
        '400':
          description: Either no question posed or wrong method
        '404':
          description: No active RAG component found
        '500':
          description: Something went wrong
      tags:
      - RAG
      operationId: askRagQuestionWithDocumentFilter
  /query-expansion:
    post:
      summary: Generate source-grounded query-expansion candidates
      description: >-
        Uses an LLM to generate categorized medical expansion candidates for a term,
        then optionally grounds them against configured terminology/ontology sources.
        The LLM generation step is required; grounding sources are optional.
        Ungrounded candidates are returned as `llm_only` unless disabled via grounding
        options. Provider API keys can be supplied either as `llm.options.api_key`,
        via the `Authorization: Bearer <token>` header, or via proxy-friendly
        headers such as `X-LLM-API-Key`.
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
          example: Your Bearer API Token (OpenAI, Blablador, Ollama, ...)
        description: Optional provider API token. If `llm.options.api_key` is omitted, a bearer token from this header is passed to the LLM provider as `api_key`.
      - name: X-LLM-API-Key
        in: header
        required: false
        schema:
          type: string
          example: blablador-api-token
        description: Optional proxy-friendly alternative to the Authorization header for provider API keys.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryExpansionRequest'
            examples:
              ollamaWithoutGrounding:
                summary: Ollama-backed expansion without grounding sources
                value:
                  term: myocardial infarction
                  language: en
                  categories:
                  - synonym
                  - medication
                  - symptom
                  limit_per_category: 5
                  llm:
                    model: llama3.1
                    options:
                      provider: ollama
                      base_url: http://localhost:11434
                  grounding:
                    include_llm_only: true
              blabladorWithAuthorizationHeader:
                summary: Blablador-backed expansion using Authorization header for the API key
                value:
                  term: Myokardinfarkt
                  language: de
                  categories:
                  - synonym
                  - medication
                  - symptom
                  limit_per_category: 5
                  llm:
                    model: alias-fast
                    options:
                      provider: blablador
                      base_url: https://api.helmholtz-blablador.fz-juelich.de/v1/
                      temperature: 0.0
                  grounding:
                    include_llm_only: true
              localGrounding:
                summary: Expansion grounded against a local terminology file
                value:
                  term: myocardial infarction
                  language: en
                  categories:
                  - synonym
                  - diagnosis
                  llm:
                    model: llama3.1
                    options:
                      provider: ollama
                  sources:
                  - name: local-medical-terms
                    type: local
                    path: conf/query-expansion/grounding/medical_terms.example.yml
                  grounding:
                    include_llm_only: true
                    minimum_score: 0.8
      responses:
        '200':
          description: Query-expansion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryExpansionResponse'
              examples:
                expanded:
                  summary: Categorized expansion response
                  value:
                    term: myocardial infarction
                    language: en
                    expansions:
                      synonym:
                      - term: heart attack
                        category: synonym
                        status: grounded
                        confidence: 1.0
                        evidence:
                        - source: local-medical-terms
                          matched_term: heart attack
                          score: 1.0
                          relation: exact_or_synonym
                          source_id: C001
                          metadata: {}
                        rationale: Common lay term for myocardial infarction.
                      medication:
                      - term: aspirin
                        category: medication
                        status: llm_only
                        confidence: 0.0
                        evidence: []
                        rationale: Medication commonly associated with myocardial infarction treatment.
        '400':
          description: Invalid request or query-expansion configuration
        '500':
          description: Unexpected query-expansion error
      tags:
      - Query expansion
      operationId: expandQuery
  /status:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get the status of a specified process
      responses:
        '200':
          description: Status of the specified process
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessesResponse'
        '404':
          description: Process not found
      tags:
      - Processes
      operationId: getProcessStatus
  /status/document-server:
    post:
      summary: Check if the data server specified in an uploaded document_server_config
        file is reachable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                port:
                  type: integer
                  example: 9008
                url:
                  type: string
                  example: http://localhost
                index:
                  type: string
                  example: documents
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentServerConfigUpload'
      responses:
        '200':
          description: Document server is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentServerStatus'
        '503':
          description: Document server is not reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentServerStatus'
      tags:
      - Status
      operationId: checkDocumentServer
    get:
      tags:
      - Status
      operationId: getDocumentServerStatusPlaceholder
      summary: Document-server status placeholder
      description: 'Currently returns a placeholder message: Method ''GET'' not yet
        implemented.'
      responses:
        '200':
          description: Placeholder response
  /status/rag:
    parameters:
    - $ref: '#/components/parameters/process_name'
    get:
      summary: Get the status of a RAG component for a specific process
      responses:
        '200':
          description: Status of the RAG component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGStatus'
        '404':
          description: Process not found
      tags:
      - Status
      operationId: getRagStatus
  /graph/document/{document_id}:
    parameters:
    - $ref: '#/components/parameters/process_name'
    - name: document_id
      in: path
      required: true
      schema:
        type: string
      description: ID of the added document to remove from graph/vector-store provenance.
    delete:
      tags:
      - Graph documents
      operationId: deleteGraphDocument
      summary: Remove an added document from concept graph provenance
      description: Removes the document references from serialized concept graphs
        and, when vector-store provenance is available, removes the document provenance
        from matching Marqo entries. Embedding entries can optionally be deleted when
        no document references remain.
      parameters:
      - name: remove_unreferenced_nodes
        in: query
        required: false
        schema:
          type: boolean
          default: true
        description: Remove graph nodes that have no remaining document references
          after deletion.
      - name: delete_unreferenced_embeddings
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: Delete vector-store entries when removing this document leaves
          no document provenance on the entry.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vectorstore_server:
                  type: object
      responses:
        '200':
          description: Document provenance was removed.
        '400':
          description: Malformed request.
        '404':
          description: Document provenance or graph data was not found.
        '500':
          description: Unexpected deletion error.
components:
  schemas:
    Status:
      type: object
      properties:
        name:
          type: string
          example: data
        rank:
          type: integer
          example: 1
        status:
          type: string
          example: running
      required:
      - name
      - rank
      - status
    Process:
      type: object
      properties:
        name:
          type: string
          example: process1
        status:
          type: array
          items:
            $ref: '#/components/schemas/Status'
      required:
      - name
      - status
    ProcessesResponse:
      type: object
      properties:
        processes:
          type: array
          items:
            $ref: '#/components/schemas/Process'
      required:
      - processes
    DocumentServerConfigUpload:
      type: object
      properties:
        document_server_config:
          type: string
          format: binary
          description: The configuration file for the document server
      required:
      - document_server_config
    DocumentServerStatus:
      type: object
      properties:
        reachable:
          type: boolean
          example: true
        message:
          type: string
          example: Document server is reachable.
      required:
      - reachable
      - message
    ExpansionCategory:
      type: string
      description: Semantic category requested from/assigned by the expansion LLM.
      enum:
      - synonym
      - medication
      - diagnosis
      - symptom
      - procedure
      - abbreviation
      - broader_term
      - narrower_term
      - related_term
    GroundingStatus:
      type: string
      description: How well a generated candidate is supported by configured sources.
      enum:
      - grounded
      - partially_grounded
      - llm_only
      - rejected
    QueryExpansionLLMConfig:
      type: object
      description: LLM configuration for the selected query-expansion generator. The default generator uses LangChain.
      properties:
        model:
          type: string
          description: Model identifier passed to the selected generator/provider.
          example: llama3.1
        system_prompt:
          type: string
          nullable: true
          description: Optional system prompt for generators/providers that support one.
        instructions:
          type: string
          nullable: true
          description: Optional deployment/user instructions reserved for generator-specific use.
        options:
          type: object
          description: Provider-specific options. For LangChain, `provider` currently supports `ollama`, `openai`, and `blablador`.
          example:
            provider: ollama
            base_url: http://localhost:11434
            temperature: 0.0
      required:
      - model
    QueryExpansionSourceConfig:
      type: object
      description: Optional source used to ground or enrich LLM-generated candidates. Currently `type=local` is implemented.
      properties:
        name:
          type: string
          description: Human-readable source name used in evidence entries.
          example: local-medical-terms
        type:
          type: string
          description: Source adapter type.
          example: local
        path:
          type: string
          nullable: true
          description: Path to a local YAML/JSON terminology file for `type=local`.
          example: conf/query-expansion/grounding/medical_terms.example.yml
        url:
          type: string
          nullable: true
          description: Reserved for future HTTP/API-backed source adapters.
        options:
          type: object
          description: Adapter-specific source options.
      required:
      - name
    QueryExpansionGroundingOptions:
      type: object
      description: Controls how candidates are filtered after source grounding.
      properties:
        include_llm_only:
          type: boolean
          default: true
          description: Include candidates generated by the LLM but not found in configured sources.
        minimum_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.0
          description: Minimum source score required to mark a candidate as grounded.
        reject_below_minimum:
          type: boolean
          default: false
          description: Drop candidates below `minimum_score` instead of returning them as `llm_only`.
    QueryExpansionPromptConfig:
      type: object
      description: Optional prompt profile/template/category-description overrides. Defaults are loaded from `conf/query-expansion/localization/{language}.yml`.
      properties:
        profile:
          type: string
          nullable: true
          description: Prompt profile/language file to load, e.g. `de` or `en`. Defaults to request language.
          example: de
        template:
          type: string
          nullable: true
          description: Optional prompt template override. Supports `{term}`, `{language}`, `{language_name}`, `{limit_per_category}`, `{categories_json}`, and `{schema_instruction}`.
        category_descriptions:
          type: object
          description: Optional localized/custom category descriptions keyed by stable category ID.
          additionalProperties:
            type: string
    QueryExpansionRequest:
      type: object
      properties:
        term:
          type: string
          minLength: 1
          description: Input term or query to expand.
          example: myocardial infarction
        language:
          type: string
          description: Language code used for prompting and source lookup.
          default: en
          example: en
        categories:
          type: array
          description: Semantic expansion categories requested from the LLM.
          items:
            $ref: '#/components/schemas/ExpansionCategory'
        limit_per_category:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Maximum number of generated candidates per category.
        llm:
          $ref: '#/components/schemas/QueryExpansionLLMConfig'
        sources:
          type: array
          description: Optional grounding sources. If omitted, candidates can still be returned as `llm_only`.
          items:
            $ref: '#/components/schemas/QueryExpansionSourceConfig'
        grounding:
          $ref: '#/components/schemas/QueryExpansionGroundingOptions'
        prompt:
          $ref: '#/components/schemas/QueryExpansionPromptConfig'
      required:
      - term
      - llm
    QueryExpansionEvidence:
      type: object
      properties:
        source:
          type: string
          description: Source name that produced the evidence.
        matched_term:
          type: string
          description: Source term/synonym that matched the generated candidate.
        score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Grounding confidence score assigned by the source adapter.
        relation:
          type: string
          nullable: true
          description: Source relation type, e.g. exact_or_synonym, broader, narrower.
        source_id:
          type: string
          nullable: true
          description: Optional concept/code identifier from the source.
        metadata:
          type: object
          description: Additional source-specific evidence metadata.
      required:
      - source
      - matched_term
      - score
    GroundedExpansionCandidate:
      type: object
      properties:
        term:
          type: string
          description: Expansion term returned to the caller.
        category:
          $ref: '#/components/schemas/ExpansionCategory'
        status:
          $ref: '#/components/schemas/GroundingStatus'
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Highest grounding evidence score, or 0 for ungrounded LLM-only terms.
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/QueryExpansionEvidence'
        rationale:
          type: string
          nullable: true
          description: Optional LLM rationale copied from the generated candidate. This is not grounding evidence.
      required:
      - term
      - category
      - status
      - confidence
    QueryExpansionResponse:
      type: object
      properties:
        term:
          type: string
          description: Original input term.
        language:
          type: string
          description: Request language.
        expansions:
          type: object
          description: Expansion candidates grouped by requested category.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/GroundedExpansionCandidate'
      required:
      - term
      - language
      - expansions
    RAGStatus:
      type: object
      properties:
        name:
          type: string
          example: default
        active:
          type: boolean
          example: true
        error:
          type: string
          example: None
    GraphDocumentAddition:
      type: object
      properties:
        vectorstore_server:
          type: object
        document_server:
          type: object
        language:
          type: string
        documents:
          type: array
          items:
            type: object
            required:
            - name
            - content
            properties:
              id:
                type: string
              name:
                type: string
              content:
                type: string
              label:
                type: string
      required:
      - language
      - documents
    PipelineConfiguration:
      type: object
      properties:
        config:
          type: object
          properties:
            clustering:
              type: object
              properties:
                algorithm:
                  type: string
                  example: kmeans
                clustering:
                  type: object
                  example: {}
                deduction:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      example: true
                    k_max:
                      type: integer
                      example: 100
                    k_min:
                      type: integer
                      example: 2
                    n_samples:
                      type: integer
                      example: 15
                    regression_poly_degree:
                      type: integer
                      example: 5
                    sample_fraction:
                      type: integer
                      example: 25
                downscale:
                  type: string
                  example: umap
                missing_as_recommended:
                  type: boolean
                  example: true
                scaling:
                  type: object
                  properties:
                    min_dist:
                      type: number
                      example: 0.1
                    n_components:
                      type: integer
                      example: 100
                    n_neighbors:
                      type: integer
                      example: 10
            data:
              type: object
              properties:
                case_sensitive:
                  type: boolean
                  example: false
                disable:
                  type: string
                  nullable: true
                  example: null
                file_encoding:
                  type: string
                  example: utf-8
                file_extension:
                  type: string
                  example: txt
                head_only:
                  type: boolean
                  example: false
                n_process:
                  type: integer
                  example: 1
                negspacy:
                  type: object
                  properties:
                    configuration:
                      type: object
                      properties:
                        feat_of_interest:
                          type: string
                          example: NC
                        language:
                          type: string
                          example: en
                        scope:
                          type: integer
                          example: 1
                    enabled:
                      type: boolean
                      example: true
                prepend_head:
                  type: boolean
                  example: false
                spacy_model:
                  type: string
                  example: en_core_web_trf
                tfidf_filter:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      example: false
                    max_df:
                      type: integer
                      example: 1
                    min_df:
                      type: integer
                      example: 1
                    stop:
                      type: string
                      nullable: true
                      example: null
                use_lemma:
                  type: boolean
                  example: false
            embedding:
              type: object
              properties:
                model:
                  type: string
                  example: sentence-transformers/paraphrase-albert-small-v2
                n_process:
                  type: integer
                  example: 1
                storage:
                  type: object
                  properties:
                    config:
                      type: object
                      properties:
                        annParameters:
                          type: object
                          properties:
                            parameters:
                              type: object
                              properties:
                                efConstruction:
                                  type: integer
                                  example: 1024
                                m:
                                  type: integer
                                  example: 16
                            spaceType:
                              type: string
                              example: dotproduct
                        normalizeEmbeddings:
                          type: boolean
                          example: false
                    method:
                      type: string
                      example: vectorstore
            graph:
              type: object
              properties:
                cluster:
                  type: object
                  properties:
                    distance:
                      type: number
                      example: 0.7
                    min_size:
                      type: integer
                      example: 4
                graph:
                  type: object
                  properties:
                    cosine_weight:
                      type: number
                      example: 0.6
                    graph_weight_cut_off:
                      type: number
                      example: 0.6
                    merge_threshold:
                      type: number
                      example: 0.9
                    simplify:
                      type: number
                      example: 0.5
                    simplify_alg:
                      type: string
                      example: significance
                    sub_clustering:
                      type: boolean
                      example: false
                    unroll:
                      type: boolean
                      example: false
                restrict_to_cluster:
                  type: boolean
                  example: true
        document_server:
          type: object
          properties:
            index:
              type: string
              example: documents
            label_key:
              type: string
              example: label
            other_id:
              type: string
              example: id
            port:
              type: integer
              example: 9008
            replace_keys:
              type: object
              properties:
                text:
                  type: string
                  example: content
            size:
              type: integer
              example: 30
            url:
              type: string
              example: http://localhost
        language:
          type: string
          example: en
        name:
          type: string
          example: default
        vectorstore_server:
          type: object
          properties:
            port:
              type: integer
              example: 8882
            url:
              type: string
              example: http://localhost
    RAGPromptTemplate:
      properties:
        profile:
          type: string
          description: Prompt profile loaded from `conf/rag/localization/{profile}.yml`.
          example: en
        template:
          type: string
          description: Direct template override. Built-in variables are `{question}` and `{summaries}`.
        templates:
          type: object
          description: Legacy inline templates. Keys are language codes and values are the respective prompts.
          properties:
            en:
              type: string
            de:
              type: string
        input_variables:
          type: array
          description: A list of variables that are referenced in the prompt (i.e.
            surrounded by curly brackets).
          items:
            type: string
      example:
        profile: en
    RAGConfiguration:
      properties:
        api_key:
          type: string
          example: ''
        chatter:
          type: object
        language:
          type: string
          example: en
        prompt_template:
          $ref: '#/components/schemas/RAGPromptTemplate'
        vectorstore_server:
          type: object
          properties:
            url:
              type: string
              example: http://localhost
            port:
              type: integer
              example: 8882
            index_settings:
              type: object
      type: object
      required:
      - api_key
  parameters:
    process:
      name: process
      in: path
      required: true
      schema:
        type: string
      description: Name of the process
    process_name:
      name: process
      in: query
      required: false
      schema:
        type: string
      description: Name of the process
    language:
      name: language
      in: query
      required: false
      schema:
        type: string
      description: Language the documents are written in
      example: en
tags:
- name: Pipeline
  description: Start pipeline runs and inspect pipeline configuration.
- name: Artifacts
  description: Inspect preprocessing, embedding, clustering, and graph artifacts.
- name: Graph documents
  description: Add documents to existing concept graphs.
- name: Processes
  description: List, inspect, stop, and delete pipeline processes.
- name: RAG
  description: Initialize and query the retrieval augmented generation component.
- name: Query expansion
  description: Generate categorized LLM query expansions with optional grounding.
- name: Status
  description: Check external services and runtime component status.
