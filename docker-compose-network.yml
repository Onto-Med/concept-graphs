services:
  concept-graphs-api:
    image: imise/top/concept-graphs-api:0.9.5
    restart: unless-stopped
    ports:
      - 9007:9007
    volumes:
      - results:/rest_api/tmp
      - type: bind
        source: .
        target: /rest_api/
    networks:
      - concept-graphs-network

volumes:
  results:

networks:
  concept-graphs-network:
    external: true
    name: concept-graphs-network
